interface=wlan0
bridge=br0
driver=nl80211

country_code=CN

ssid=MT7981_WiFi6_2.4G

hw_mode=g
channel=1

ieee80211n=1     # 开启 Wi-Fi 4 (HT)
ieee80211ac=1    # 开启 Wi-Fi 5 扩展
ieee80211ax=1    # 开启 Wi-Fi 6 (HE)

#auth_algs=3

#wpa: which WPA implementation to use
#1 - wpa only
#2 - wpa2 only
#3 - both
wpa=2
wpa_key_mgmt=WPA-PSK
wpa_pairwise=CCMP
rsn_pairwise=CCMP
wpa_passphrase=12345678
macaddr_acl=0
ignore_broadcast_ssid=0
